name: Backend CI/CD

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Validate Backend Code
  # ─────────────────────────────────────────────
  validate:
    name: Validate Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: backend

      - name: Verify Entry Point Exists
        run: |
          if [ ! -f "src/server.js" ]; then
            echo "ERROR: src/server.js not found!"
            exit 1
          fi
          echo "OK: src/server.js found"
        working-directory: backend

      - name: Verify API Entry Point Exists
        run: |
          if [ ! -f "api/index.js" ]; then
            echo "ERROR: api/index.js not found!"
            exit 1
          fi
          echo "OK: api/index.js found"
        working-directory: backend

      - name: Check for Syntax Errors
        run: node --check src/server.js
        working-directory: backend

      - name: Check API Entry Syntax
        run: node --check api/index.js
        working-directory: backend

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Vercel (only on main push)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: backend

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy Backend to Vercel (Production)
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: backend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
