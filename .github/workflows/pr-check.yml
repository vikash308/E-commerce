name: PR Validation Check

on:
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # Frontend Validation
  # ─────────────────────────────────────────────
  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://placeholder-api.com

  # ─────────────────────────────────────────────
  # Backend Validation
  # ─────────────────────────────────────────────
  backend-check:
    name: Backend Validation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: npm ci
        working-directory: backend

      - name: Check Entry Points
        run: |
          test -f src/server.js && echo "server.js OK" || (echo "server.js missing" && exit 1)
          test -f api/index.js && echo "api/index.js OK" || (echo "api/index.js missing" && exit 1)
        working-directory: backend

      - name: Syntax Check
        run: |
          node --check src/server.js
          node --check api/index.js
        working-directory: backend

  # ─────────────────────────────────────────────
  # Summary Job - PR Merge Guard
  # ─────────────────────────────────────────────
  pr-gate:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]

    steps:
      - name: PR Ready to Merge
        run: echo "All checks passed! This PR is safe to merge into main."
